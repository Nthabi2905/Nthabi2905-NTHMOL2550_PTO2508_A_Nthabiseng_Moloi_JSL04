<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>

    <link rel="icon" type="image/png" href="assets/favicon.svg" />

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: "#F4F7FD",
              card: "#FFFFFF",
              textMuted: "#828FA3",
              primary: "#635FC7",
              todo: "#49C4E5",
              doing: "#8471F2",
              done: "#67E2AE",
              red: "#EA5555",
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
  </head>

  <body class="bg-bg min-h-screen">
    <!-- HEADER -->
    <div class="flex items-center justify-between p-8">
      <h2 class="text-2xl font-bold">Launch Career</h2>

      <button
        class="bg-primary text-white font-bold px-6 py-3 rounded-full hover:bg-primary/90"
      >
        + Add New Task
      </button>
    </div>

    <!-- BOARD -->
    <div class="flex gap-6 px-8 flex-col md:flex-row">
      <!-- TODO -->
      <div class="flex-1 min-w-[280px]">
        <div class="flex items-center gap-3 mb-6">
          <span class="w-3 h-3 rounded-full bg-todo"></span>
          <h4 class="text-sm tracking-widest text-textMuted font-semibold">
            TODO (<span id="todo-count">0</span>)
          </h4>
        </div>

        <div id="todo-column" class="space-y-4"></div>
      </div>

      <!-- DOING -->
      <div class="flex-1 min-w-[280px]">
        <div class="flex items-center gap-3 mb-6">
          <span class="w-3 h-3 rounded-full bg-doing"></span>

          <h4 class="text-sm tracking-widest text-textMuted font-semibold">
            DOING (<span id="doing-count">0</span>)
          </h4>
        </div>

        <div id="doing-column" class="space-y-4"></div>
      </div>

      <!-- DONE -->
      <div class="flex-1 min-w-[280px]">
        <div class="flex items-center gap-3 mb-6">
          <span class="w-3 h-3 rounded-full bg-done"></span>

          <h4 class="text-sm tracking-widest text-textMuted font-semibold">
            DONE (<span id="done-count">0</span>)
          </h4>
        </div>

        <div id="done-column" class="space-y-4"></div>
      </div>
    </div>

    <!-- MODAL -->
    <div
      id="task-modal"
      class="fixed inset-0 bg-black/50 hidden items-center justify-center"
    >
      <div class="bg-white w-full max-w-md rounded-xl p-8 relative">
        <button
          id="close-modal-btn"
          class="absolute top-4 right-4 text-red text-xl font-bold"
        >
          &times;
        </button>

        <h2 class="text-xl font-bold mb-6">Task</h2>

        <label class="text-sm text-gray-500">Title</label>

        <input
          type="text"
          id="task-title"
          class="w-full border rounded p-2 mb-4"
        />

        <label class="text-sm text-gray-500">Description</label>

        <textarea
          id="task-desc"
          rows="4"
          class="w-full border rounded p-2 mb-4"
        ></textarea>

        <label class="text-sm text-gray-500">Status</label>

        <select id="task-status" class="w-full border rounded p-2 mb-6">
          <option value="todo">todo</option>
          <option value="doing">doing</option>
          <option value="done">done</option>
        </select>

        <button
          id="save-task-btn"
          class="bg-primary text-white w-full py-3 rounded-full"
        >
          Save Changes
        </button>
      </div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
